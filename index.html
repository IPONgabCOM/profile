<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>/Dre</title>

<!-- Favicon (dynamic Discord avatar) -->
<link rel="icon" id="dynamic-favicon" href="">

<!-- CSS -->
<link rel="stylesheet" href="style.css">

<!-- Icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>

<!-- =========================
   CLICK TO ENTER
========================= -->
<div id="overlay">
  <div class="click-text">c l i c k</div>
</div>

<!-- =========================
   BACKGROUND
========================= -->
<div class="background-container">
  <img src="https://media.giphy.com/media/k18AJ9319EKBD2o6gx/giphy.gif" alt="background">
</div>

<!-- =========================
   MUSIC
========================= -->
<audio id="bg-music" loop preload="auto">
  <source src="Gat Putch - Halik Sobrang Diin PT.2 (feat. Louie Grammz & Mi'Kel).mp3">
</audio>

<!-- =========================
   MAIN PROFILE CARD
========================= -->
<div class="main-content">
  <div class="profile-card">

    <!-- AVATAR SECTION -->
    <div class="avatar-container">

      <!-- DISCORD AVATAR DECORATION -->
      <img id="discord-decoration" class="avatar-decoration" style="display:none;" alt="decoration">

      <!-- MAIN AVATAR -->
      <img id="discord-avatar" class="avatar" alt="avatar">

      <!-- STATUS DOT -->
      <div id="status-dot" class="status-dot offline"></div>

      <!-- HOVER CARD -->
      <div class="discord-card">

        <img id="card-avatar" alt="card avatar">

        <h2 id="card-name">dwep</h2>
        <p id="card-username">@dwep</p>

        <p id="card-status-text" class="status-text">Offline</p>

      </div>

    </div>

    <!-- =========================
         DISPLAY NAME
    ========================= -->
    <h1 id="display-name">dwep</h1>

    <!-- NOTE UNDER NAME -->
    <div id="note-section" style="display:none;">
      <p id="discord-note"></p>
    </div>

    <!-- =========================
         NOW PLAYING
    ========================= -->
    <div class="now-playing">
      🎵 Now Playing: Halik Sobrang Diin PT.2
    </div>

    <!-- =========================
         SOCIALS (YOUR UPDATED LINKS)
    ========================= -->
    <div class="socials">

      <a href="https://www.instagram.com/d739140803/" target="_blank">
        <i class="fab fa-instagram"></i>
      </a>

      <a href="https://www.tiktok.com/@d739140803?_r=1" target="_blank">
        <i class="fab fa-tiktok"></i>
      </a>

      <a href="https://open.spotify.com/user/31teeiisbzosngdzt7evqmmchpdy" target="_blank">
        <i class="fab fa-spotify"></i>
      </a>

      <a href="https://discord.com/users/826362723792977950" id="discord-link" target="_blank">
        <i class="fab fa-discord"></i>
      </a>

    </div>

    <!-- =========================
         VIEWS
    ========================= -->
    <div class="view-pill">
      Views: <span id="view-count">0</span>
    </div>

  </div>
</div>

<!-- =========================
   FOOTER
========================= -->
<div class="made-by">Made By: Dre</div>

<!-- SCRIPT -->
<script src="script.js"></script>

</body>
</html>
